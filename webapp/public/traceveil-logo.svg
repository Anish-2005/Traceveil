<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium gradient definitions -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ee7b7;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#06b6d4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0" />
    </radialGradient>

    <!-- Shadow and glow effects -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGradient)" opacity="0.3" filter="blur(8px)"/>

  <!-- Main shield form with modern hexagon-inspired design -->
  <path d="M100 25 L155 50 L170 100 L155 150 L100 175 L45 150 L30 100 L45 50 Z"
        fill="url(#primaryGradient)"
        stroke="#ffffff"
        stroke-width="1.5"
        filter="url(#shadow)"
        opacity="0.95"/>

  <!-- Inner geometric pattern - represents network/security grid -->
  <g opacity="0.8">
    <!-- Hexagonal network pattern -->
    <path d="M100 45 L125 57.5 L125 82.5 L100 95 L75 82.5 L75 57.5 Z"
          fill="none"
          stroke="#ffffff"
          stroke-width="1"
          opacity="0.6"/>
    <path d="M100 65 L112.5 72.5 L112.5 87.5 L100 95 L87.5 87.5 L87.5 72.5 Z"
          fill="none"
          stroke="#60a5fa"
          stroke-width="0.8"
          opacity="0.7"/>
  </g>

  <!-- Central surveillance eye with digital elements -->
  <g transform="translate(100,100)">
    <!-- Outer surveillance ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#e2e8f0" stroke-width="1.5" opacity="0.6"/>

    <!-- Digital iris with circuit pattern -->
    <circle cx="0" cy="0" r="12" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="0" cy="0" r="8" fill="#0f172a" stroke="#60a5fa" stroke-width="0.5"/>

    <!-- Pupil with data visualization -->
    <circle cx="0" cy="0" r="4" fill="#000000"/>
    <circle cx="-1" cy="-1" r="1.5" fill="#ffffff" opacity="0.9"/>

    <!-- Digital scan lines emanating from center -->
    <line x1="-15" y1="0" x2="-8" y2="0" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <line x1="8" y1="0" x2="15" y2="0" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <line x1="0" y1="-15" x2="0" y2="-8" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <line x1="0" y1="8" x2="0" y2="15" stroke="#34d399" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- Radar detection waves with modern styling -->
  <g opacity="0.7">
    <circle cx="100" cy="100" r="35" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="100" cy="100" r="50" fill="none" stroke="url(#accentGradient)" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <circle cx="100" cy="100" r="65" fill="none" stroke="url(#accentGradient)" stroke-width="0.8" stroke-dasharray="2,4" opacity="0.4"/>
  </g>

  <!-- Data flow particles with animation -->
  <g opacity="0.9">
    <circle cx="75" cy="75" r="2" fill="#10b981">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;2.5;1.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="125" cy="80" r="1.8" fill="#34d399">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.3;2.3;1.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="125" r="2.2" fill="#6ee7b7">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.7;2.7;1.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="115" cy="115" r="1.6" fill="#10b981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.1;2.1;1.1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Subtle circuit connections -->
  <g opacity="0.5" stroke="#60a5fa" stroke-width="0.8">
    <path d="M70 70 L80 75 L85 85" fill="none"/>
    <path d="M130 75 L125 85 L115 90" fill="none"/>
    <path d="M75 130 L85 125 L95 115" fill="none"/>
    <path d="M125 125 L115 115 L105 110" fill="none"/>
  </g>

  <!-- Corner accent elements for brand recognition -->
  <g opacity="0.6">
    <rect x="35" y="35" width="8" height="2" fill="#06b6d4" rx="1"/>
    <rect x="157" y="35" width="8" height="2" fill="#06b6d4" rx="1"/>
    <rect x="35" y="163" width="8" height="2" fill="#06b6d4" rx="1"/>
    <rect x="157" y="163" width="8" height="2" fill="#06b6d4" rx="1"/>
  </g>
</svg>